<!doctype html>
<html lang="es">

<head>
  <script>
    if (localStorage.getItem('pacifico_theme') === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta de Saberes y Oportunidades</title>
  <meta name="description"
    content="Landing de acceso a la ruleta de Saberes y Oportunidades de Fundación Pacífico Emprende." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  
  <!-- Botón Global de Cambio de Tema -->
  <button type="button" id="themeToggleButton" class="theme-toggle-btn top-right" aria-label="Cambiar tema (Claro / Oscuro)">
    <span class="toggle-icon" aria-hidden="true">🌓</span>
  </button>

  <main class="global-shell landing-shell">
    <section class="brand-panel surface">
      <p class="eyebrow">Fundación Pacífico Emprende</p>
      <h1>Pacífico Emprende</h1>
      <p class="route-label">Ruta de orientación socio ocupacional</p>
      <p class="lead">
        Una puerta de entrada para explorar talentos, vínculos y rutas de
        desarrollo pensadas para Tumaco y el Pacífico.
      </p>

      <div class="hero-actions" aria-label="Módulos disponibles">
        <a class="launch-button btn-ruleta" href="Ruleta/index.html">Ruleta de Saberes</a>
        <a class="launch-button btn-horizonte" href="Horizonte/index.html">Horizonte de Sueños</a>
        <a class="launch-button btn-cronograma" href="Cronograma/index.html">Cronograma de Acción</a>
      </div>
    </section>
  </main>

  <script>
    // Inicializar tema desde LocalStorage (sincronizar con documentElement por si acaso)
    const savedTheme = localStorage.getItem('pacifico_theme');
    if (savedTheme === 'light') {
      document.documentElement.classList.add('light-theme');
    }
    
    // Manejar evento de toggle
    const toggleBtn = document.getElementById('themeToggleButton');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        document.documentElement.classList.toggle('light-theme');
        const isLight = document.documentElement.classList.contains('light-theme');
        localStorage.setItem('pacifico_theme', isLight ? 'light' : 'dark');
      });
    }
  </script>
</body>

</html>
